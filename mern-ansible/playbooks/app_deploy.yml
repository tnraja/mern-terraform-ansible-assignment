---
- name: Deploy MERN application
  hosts: web
  become: yes
  vars:
    app_dir: /opt/travelmemory
    db_private_ip: "{{ hostvars['db']['ansible_host'] }}"
  tasks:
    - name: Deploy backend .env file
      template:
        src: ../templates/.env.j2
        dest: "{{ app_dir }}/backend/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Stop existing PM2 processes (if any)
      become_user: ubuntu
      shell: pm2 delete all || true

    - name: Start backend with PM2
      become_user: ubuntu
      shell: |
        cd {{ app_dir }}/backend
        pm2 start index.js --name "travelmemory-backend"

    - name: Build React frontend
      become_user: ubuntu
      shell: |
        cd {{ app_dir }}/frontend
        REACT_APP_BACKEND_URL=http://{{ ansible_host }}:5000 npm run build
      environment:
        CI: "false"

    - name: Configure Nginx to serve React build and proxy API
      copy:
        dest: /etc/nginx/sites-available/travelmemory
        content: |
          server {
              listen 80;
              server_name _;
              root /opt/travelmemory/frontend/build;
              index index.html;
              location / {
                  try_files $uri /index.html;
              }
              location /api/ {
                  proxy_pass http://localhost:5000/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/travelmemory
        dest: /etc/nginx/sites-enabled/travelmemory
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Set PM2 to start on system boot
      shell: pm2 startup systemd -u ubuntu --hp /home/ubuntu

    - name: Save PM2 process list for reboot
      become_user: ubuntu
      shell: pm2 save
